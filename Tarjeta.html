<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TABLAS EJEMPLO 2</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #dad7b8; 
        }

        
        .header {
            background-color: #3b70e3; 
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 29px; 
            font-weight: bold;
        }


        .container {
            background-color: rgb(194, 19, 19);
            margin: 25px; 
            padding: 25px; 
            border-radius: 12px; 
        }

        .title {
            font-size: 25px; 
            font-weight: bold;
            margin-bottom: 25px; 
            text-align: center;
        }

        
        .cards-container {
            display: flex;
            justify-content: space-between;
            gap: 22px
        }

        .card {
            flex: 1;
            background-color: #475578; 
            padding: 45px 0; 
            text-align: center;
            font-size: 23px; 
            font-weight: bold;
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <div class="header">TABLAS EJEMPLO 2</div>

    <div class="container">
        <div class="title">TARJETAS</div>

        <div class="cards-container">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
        </div>
    </div>

</body>
</html>
